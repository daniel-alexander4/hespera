services:
  hespera:
    build: .
    user: "${UID:-65532}:${GID:-144}"
    ports:
      - "8080:8080"
    volumes:
      - /etc/hespera/data:/var/lib/hespera
      - /media/hespera:/media/hespera
    environment:
      HESPERA_LISTEN: ":8080"
      HESPERA_DATA_DIR: "/var/lib/hespera"
      HESPERA_MEDIA_ROOT: "/media/hespera"
      AUTH_ENABLED: "false"
      # Value supplied via the gitignored .env file (TMDB v3 API key)
      HESPERA_TMDB_API_KEY: "${HESPERA_TMDB_API_KEY:-}"
    restart: unless-stopped
