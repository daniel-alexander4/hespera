services:
  hespera:
    build: .
    user: "${UID:-65532}:${GID:-144}"
    ports:
      - "8080:8080"
    volumes:
      - /etc/hespera/data:/var/lib/hespera
      - /media/dan/08a75612-85eb-4dd3-bc14-0bfe54ae2f88:/media
    environment:
      HESPERA_LISTEN: ":8080"
      HESPERA_DATA_DIR: "/var/lib/hespera"
      HESPERA_MEDIA_ROOT: "/media"
      AUTH_ENABLED: "false"
    restart: unless-stopped
