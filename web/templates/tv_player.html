{{define "content"}}
<div class="tv-player-page">
  <div class="tv-player-header">
    <h1><a href="/tv/series/{{.SeriesID}}">{{.ShowName}}</a></h1>
    <h2>S{{.SeasonNum}} — {{.EpName}}</h2>
  </div>

  <div class="tv-player-video-wrap">
    <video id="tvVideo" class="tv-video" controls autoplay
           data-file-id="{{.FileID}}"
           data-next-file="{{.NextFileID}}">
      Your browser does not support video playback.
    </video>
  </div>

  <div class="player-controls tv-transport" id="tvTransport">
    <button id="tvRewindBtn" type="button" class="btn btn-sm" aria-label="Rewind 10 seconds" title="Rewind 10s">{{template "icon-rewind"}}</button>
    <button id="tvToggleBtn" type="button" class="btn btn-primary btn-sm" aria-label="Play or pause" title="Play / Pause"><span class="tv-glyph-play">{{template "icon-play"}}</span><span class="tv-glyph-pause">{{template "icon-pause"}}</span></button>
    <button id="tvForwardBtn" type="button" class="btn btn-sm" aria-label="Forward 10 seconds" title="Forward 10s">{{template "icon-fast-forward"}}</button>
  </div>

  <div class="tv-player-controls">
    <label class="tv-track-pick" id="audioPick" hidden>Audio
      <select id="audioSelect"></select>
    </label>
    <label class="tv-track-pick" id="subPick" hidden>Subtitles
      <select id="subSelect"></select>
    </label>
    <span id="playbackMode" class="tv-playback-mode"></span>
  </div>

  <div class="tv-player-nav">
    {{if .PrevFileID}}
    <a href="/tv/player?file={{.PrevFileID}}" class="btn btn-sm">Previous</a>
    {{else}}
    <span></span>
    {{end}}
    <a href="/tv/season/?series={{.SeriesID}}&season={{.SeasonNum}}" class="btn btn-sm">Back to Season</a>
    {{if .NextFileID}}
    <a href="/tv/player?file={{.NextFileID}}" class="btn btn-sm">Next</a>
    {{else}}
    <span></span>
    {{end}}
  </div>
</div>

<script>
(() => {
  const video = document.getElementById('tvVideo');
  if (!video) return;

  const fileID = parseInt(video.dataset.fileId, 10);
  const nextFile = parseInt(video.dataset.nextFile, 10) || 0;
  const audioSelect = document.getElementById('audioSelect');
  const subSelect = document.getElementById('subSelect');
  const modeLabel = document.getElementById('playbackMode');

  let hls = null;          // active hls.js instance, if any
  let currentAud = 0, currentSub = 0;
  let selectsBuilt = false;
  let lastReport = 0;

  const nativeHLS = video.canPlayType('application/vnd.apple.mpegurl') !== '';

  function teardownHLS() {
    if (hls) { hls.destroy(); hls = null; }
  }

  function attachSource(session, seekTo) {
    teardownHLS();
    const onReady = () => { if (seekTo > 0) { try { video.currentTime = seekTo; } catch (e) {} } };

    if (session.protocol === 'hls' && !nativeHLS && window.Hls && Hls.isSupported()) {
      hls = new Hls({ enableWorker: true });
      hls.loadSource(session.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, onReady);
    } else {
      // Direct play, remux, native-HLS (Safari): the element loads the URL directly.
      video.src = session.url;
      video.addEventListener('loadedmetadata', onReady, { once: true });
      video.load();
    }
    video.play().catch(() => {}); // autoplay may be blocked; user can press play
  }

  function attachSubtitle(session) {
    for (const t of [...video.querySelectorAll('track')]) t.remove();
    if (session.subtitle_url) {
      const track = document.createElement('track');
      track.kind = 'subtitles';
      track.src = session.subtitle_url;
      track.default = true;
      track.label = 'Subtitles';
      video.appendChild(track);
      // A dynamically-added <track default> doesn't reliably auto-show across
      // browsers; force the cue track on explicitly.
      const tt = video.textTracks[video.textTracks.length - 1];
      if (tt) tt.mode = 'showing';
    }
  }

  function buildSelects(session) {
    const audio = session.audio_tracks || [];
    if (audio.length > 1) {
      audioSelect.innerHTML = '';
      audio.forEach((a) => {
        const o = document.createElement('option');
        o.value = a.ordinal;
        o.textContent = [a.language, a.title, a.codec].filter(Boolean).join(' · ') || ('Track ' + a.ordinal);
        if (a.default) o.selected = true;
        audioSelect.appendChild(o);
      });
      document.getElementById('audioPick').hidden = false;
    }
    // Only text subtitles are offered: they deliver as a WebVTT sidecar.
    // Bitmap subs (PGS/DVD/DVB) would need burn-in, which isn't implemented, so
    // listing them would be a control that silently does nothing. Each kept
    // track keeps its original 1-based ordinal (what the server expects).
    const subs = (session.subtitle_tracks || []).filter((s) => s.text);
    if (subs.length > 0) {
      subSelect.innerHTML = '';
      const off = document.createElement('option');
      off.value = 0; off.textContent = 'Off'; off.selected = true;
      subSelect.appendChild(off);
      subs.forEach((s) => {
        const o = document.createElement('option');
        o.value = s.ordinal;
        o.textContent = [s.language, s.title].filter(Boolean).join(' · ') || ('Subtitle ' + s.ordinal);
        subSelect.appendChild(o);
      });
      document.getElementById('subPick').hidden = false;
    }
    selectsBuilt = true;
  }

  async function loadFromSession(aud, sub, seekTo) {
    currentAud = aud; currentSub = sub;
    let session;
    try {
      const resp = await fetch(`/tv/playback-session?file=${fileID}&aud=${aud}&sub=${sub}`, { headers: { Accept: 'application/json' } });
      session = await resp.json();
    } catch (e) {
      modeLabel.textContent = 'Unable to start playback';
      return;
    }
    if (!session || !session.ok) { modeLabel.textContent = 'Unable to start playback'; return; }

    if (!selectsBuilt) buildSelects(session);
    modeLabel.textContent = session.decision.replace('_', ' ');
    if (session.protocol === 'hls' && !nativeHLS && !(window.Hls && Hls.isSupported())) {
      modeLabel.textContent = 'This browser cannot play the transcoded stream';
    }
    const resume = (seekTo != null) ? seekTo : (session.completed ? 0 : (session.resume_position_seconds || 0));
    attachSource(session, resume);
    attachSubtitle(session);
  }

  if (audioSelect) audioSelect.addEventListener('change', () => loadFromSession(parseInt(audioSelect.value, 10) || 0, currentSub, video.currentTime));
  if (subSelect) subSelect.addEventListener('change', () => loadFromSession(currentAud, parseInt(subSelect.value, 10) || 0, video.currentTime));

  // --- transport controls (focusable, so a TV remote in couch mode can seek;
  //     the native <video controls> scrubber isn't remote-reachable) ---
  const transport = document.getElementById('tvTransport');
  const rewindBtn = document.getElementById('tvRewindBtn');
  const toggleBtn = document.getElementById('tvToggleBtn');
  const forwardBtn = document.getElementById('tvForwardBtn');
  const seekBy = (delta) => {
    let t = video.currentTime + delta;
    if (t < 0) t = 0;
    if (Number.isFinite(video.duration) && video.duration > 0 && t > video.duration) t = video.duration;
    video.currentTime = t;
  };
  if (rewindBtn) rewindBtn.addEventListener('click', () => seekBy(-10));
  if (forwardBtn) forwardBtn.addEventListener('click', () => seekBy(10));
  if (toggleBtn) toggleBtn.addEventListener('click', () => { if (video.paused) video.play().catch(() => {}); else video.pause(); });
  video.addEventListener('play', () => { if (transport) transport.classList.add('playing'); });
  video.addEventListener('pause', () => { if (transport) transport.classList.remove('playing'); });

  // --- progress reporting (unchanged behaviour) ---
  function reportProgress(completed) {
    const now = Date.now();
    if (!completed && now - lastReport < 15000) return;
    lastReport = now;
    const body = JSON.stringify({
      file_id: fileID,
      position_seconds: video.currentTime,
      duration_seconds: video.duration || 0,
      completed: !!completed,
    });
    if (navigator.sendBeacon) {
      navigator.sendBeacon('/tv/playback-progress', new Blob([body], { type: 'application/json' }));
    } else {
      fetch('/tv/playback-progress', { method: 'POST', body, headers: { 'Content-Type': 'application/json' } });
    }
  }
  video.addEventListener('timeupdate', () => {
    reportProgress(false);
    if (video.duration > 0 && video.currentTime / video.duration >= 0.9) reportProgress(true);
  });
  video.addEventListener('pause', () => { lastReport = 0; reportProgress(false); });
  video.addEventListener('ended', () => {
    reportProgress(true);
    if (nextFile > 0) window.location.href = '/tv/player?file=' + nextFile;
  });
  window.addEventListener('beforeunload', () => { lastReport = 0; reportProgress(false); });

  // Turbo swaps the page without a full unload: send a final progress report and
  // tear down the hls.js worker before this page is cached/replaced. once:true so
  // it doesn't accumulate across repeat visits.
  document.addEventListener('turbo:before-cache', () => {
    lastReport = 0;
    reportProgress(false);
    teardownHLS();
  }, { once: true });

  loadFromSession(0, 0, null);
})();
</script>
{{end}}
