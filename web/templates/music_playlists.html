{{define "content"}}
<div class="page-header">
  <h1>Playlists</h1>
</div>

<div class="playlist-cards">

  <!-- My Music: shuffle the local library, played in-app. -->
  <section class="playlist-card">
    <h2 class="playlist-card-title">{{template "icon-music"}} My Music</h2>
    <p class="playlist-card-sub">Shuffle your own library.</p>
    {{if .LibraryID}}
    <div class="playlist-actions">
      <a class="btn btn-primary" href="/music/player?source=all&amp;shuffle=1&amp;library={{.LibraryID}}" data-play>{{template "icon-shuffle"}}Shuffle All</a>
      <a class="btn btn-primary" href="/music/player?source=popular&amp;shuffle=1&amp;library={{.LibraryID}}" data-play>{{template "icon-shuffle"}}Shuffle Most Popular</a>
    </div>
    {{else}}
    <p class="playlist-note">No music library yet. <a href="/libraries">Add and scan one</a> to start shuffling.</p>
    {{end}}
  </section>

</div>
{{end}}
