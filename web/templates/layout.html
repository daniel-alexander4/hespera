<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hespera</title>
  <script>
    (() => {
      try {
        // Light/dark mode (Catppuccin Latte/Mocha). Stored choice wins; first
        // visit follows the OS preference, falling back to dark.
        const storedMode = localStorage.getItem('iso_theme_mode');
        const mode = (storedMode === 'light' || storedMode === 'dark')
          ? storedMode
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-mode', mode);

        const fontSize = String(localStorage.getItem('iso_theme_font_size') || 'compact').trim();
        if (fontSize) document.documentElement.setAttribute('data-font-size', fontSize);

        // Couch mode: ?couch=1 enables (and is remembered), ?couch=0 clears.
        const couchParam = new URLSearchParams(location.search).get('couch');
        let couch = localStorage.getItem('iso_couch') === '1';
        if (couchParam === '1') { couch = true; localStorage.setItem('iso_couch', '1'); }
        else if (couchParam === '0') { couch = false; localStorage.removeItem('iso_couch'); }
        if (couch) document.documentElement.setAttribute('data-couch', '1');
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="{{staticv "/static/app.css"}}" />
  <link rel="stylesheet" href="{{staticv "/static/tv.css"}}" />
  <script src="{{staticv "/static/couch.js"}}" defer></script>
  <script src="{{staticv "/static/subtabs.js"}}" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="/">Hespera</a></div>
    <nav class="nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/music" class="nav-link">Music</a>
      <a href="/movies" class="nav-link">Movies</a>
      <a href="/tv" class="nav-link">TV Shows</a>
      <div class="nav-settings" data-menu>
        <a href="/settings" class="nav-link nav-menu-trigger" data-menu-trigger aria-haspopup="true" aria-expanded="false">Settings</a>
        <div class="nav-settings-panel">
          <a href="/libraries" class="nav-sub-link">Libraries</a>
          <a href="/settings/jobs" class="nav-sub-link">Job Status</a>
          <a href="/music/match/review" class="nav-sub-link">Match Review</a>
          <a href="/music/duplicates" class="nav-sub-link">Duplicates</a>
          <a href="/settings/tags" class="nav-sub-link">Tag Editor</a>
          <a href="/settings/api-keys" class="nav-sub-link">API Keys</a>
          <a href="/tv/match/review" class="nav-sub-link">TV Match</a>
          <form method="post" action="/auth/logout" class="m-0">
            <button type="submit" class="nav-sub-link">Logout</button>
          </form>
        </div>
      </div>
    </nav>
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle light and dark theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </header>

  <main class="main">
    {{template "content" .}}
  </main>

  <footer class="footer">
    <div>Hespera</div>
  </footer>

  <script>
    (() => {
      const menus = Array.from(document.querySelectorAll('[data-menu]'));
      if (!menus.length) return;

      const closeMenu = (menu) => {
        menu.removeAttribute('data-open');
        const trigger = menu.querySelector('[data-menu-trigger]');
        if (trigger) trigger.setAttribute('aria-expanded', 'false');
      };

      const openMenu = (menu) => {
        menus.forEach((m) => { if (m !== menu) closeMenu(m); });
        menu.setAttribute('data-open', '1');
        const trigger = menu.querySelector('[data-menu-trigger]');
        if (trigger) trigger.setAttribute('aria-expanded', 'true');
      };

      menus.forEach((menu) => {
        const trigger = menu.querySelector('[data-menu-trigger]');
        if (!trigger) return;
        trigger.addEventListener('click', (e) => {
          const alreadyOpen = menu.getAttribute('data-open') === '1';
          if (!alreadyOpen) {
            e.preventDefault();
            openMenu(menu);
          } else {
            closeMenu(menu);
          }
        });
      });

      document.addEventListener('click', (e) => {
        const target = e.target;
        if (!(target instanceof Node)) return;
        menus.forEach((menu) => {
          if (!menu.contains(target)) closeMenu(menu);
        });
      });

      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        menus.forEach(closeMenu);
      });
    })();

    (() => {
      const btn = document.querySelector('[data-theme-toggle]');
      if (!btn) return;
      const root = document.documentElement;
      const sync = () => {
        const light = root.getAttribute('data-mode') === 'light';
        btn.setAttribute('aria-label', light ? 'Switch to dark theme' : 'Switch to light theme');
        btn.setAttribute('aria-pressed', String(light));
      };
      sync();
      btn.addEventListener('click', () => {
        const next = root.getAttribute('data-mode') === 'light' ? 'dark' : 'light';
        root.setAttribute('data-mode', next);
        try { localStorage.setItem('iso_theme_mode', next); } catch (_) {}
        sync();
      });
    })();
  </script>
</body>
</html>
