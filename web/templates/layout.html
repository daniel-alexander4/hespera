<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hespera</title>
  {{/* Per-page <head> hook. A media-boot page (one whose inline body script
       auto-starts <video>/<audio> on render) overrides "headmeta" with
       <meta name="turbo-cache-control" content="no-preview"> so Turbo never
       renders it as a cached preview — a preview re-runs the body script on a
       throwaway DOM, orphaning a still-playing media element. */}}
  {{block "headmeta" .}}{{end}}
  <link rel="icon" type="image/svg+xml" href="{{staticv "/static/hespera-icon-favicon.svg"}}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{staticv "/static/png/hespera-icon-32.png"}}" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{staticv "/static/png/hespera-icon-16.png"}}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{staticv "/static/png/hespera-icon-180.png"}}" />
  <link rel="manifest" href="{{staticv "/static/site.webmanifest"}}" />
  <meta name="theme-color" content="#312e81" />
  <script>
    (() => {
      try {
        // Light/dark mode (Catppuccin Latte/Mocha). Stored choice wins; first
        // visit follows the OS preference, falling back to dark.
        const storedMode = localStorage.getItem('iso_theme_mode');
        const mode = (storedMode === 'light' || storedMode === 'dark')
          ? storedMode
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-mode', mode);

        const fontSize = String(localStorage.getItem('iso_theme_font_size') || 'compact').trim();
        if (fontSize) document.documentElement.setAttribute('data-font-size', fontSize);

        // Couch mode: ?couch=1 enables (and is remembered), ?couch=0 clears.
        const couchParam = new URLSearchParams(location.search).get('couch');
        let couch = localStorage.getItem('iso_couch') === '1';
        if (couchParam === '1') { couch = true; localStorage.setItem('iso_couch', '1'); }
        else if (couchParam === '0') { couch = false; localStorage.removeItem('iso_couch'); }
        if (couch) document.documentElement.setAttribute('data-couch', '1');
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="{{staticv "/static/app.css"}}" />
  <link rel="stylesheet" href="{{staticv "/static/tv.css"}}" />
  <script src="{{staticv "/static/turbo.umd.js"}}" defer></script>
  <script src="{{staticv "/static/couch.js"}}" defer></script>
  <script src="{{staticv "/static/subtabs.js"}}" defer></script>
  <script src="{{staticv "/static/hls.light.min.js"}}" defer></script>
  <script src="{{staticv "/static/media_player.js"}}" defer></script>
  <script src="{{staticv "/static/player.js"}}" defer></script>
  <script src="{{staticv "/static/tv_resume.js"}}" defer></script>
  <script src="{{staticv "/static/job_status.js"}}" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="/"><img class="brand-logo" src="{{staticv "/static/hespera-icon.svg"}}" alt="" width="28" height="28" /><span>Hespera</span></a></div>
    <nav class="nav">
      <a href="/" class="nav-link">{{template "icon-home"}}Home</a>
      <a href="/music" class="nav-link">{{template "icon-music"}}Music</a>
      <a href="/movies" class="nav-link">{{template "icon-film"}}Movies</a>
      <a href="/tv" class="nav-link">{{template "icon-tv"}}TV Shows</a>
      <div class="nav-settings" data-menu>
        <a href="/settings" class="nav-link nav-menu-trigger" data-menu-trigger aria-haspopup="true" aria-expanded="false">{{template "icon-settings"}}Settings</a>
        <div class="nav-settings-panel">
          <a href="/libraries" class="nav-sub-link">Libraries</a>
          <a href="/settings/jobs" class="nav-sub-link">Job Status</a>
          <a href="/music/match/review" class="nav-sub-link">Match Review</a>
          <a href="/music/duplicates" class="nav-sub-link">Duplicates</a>
          <a href="/settings/tags" class="nav-sub-link">Tag Editor</a>
          <a href="/settings/api-keys" class="nav-sub-link">API Keys</a>
          <a href="/tv/match/review" class="nav-sub-link">TV Match</a>
          <a href="/settings/about" class="nav-sub-link">About</a>
          <form method="post" action="/auth/logout" class="m-0">
            <button type="submit" class="nav-sub-link">Logout</button>
          </form>
        </div>
      </div>
    </nav>
    <!-- Resume-watching chip for TV/video. data-turbo-permanent so it persists
         across visits; tv_resume.js shows it when you've navigated away from a
         player and hides it while you're on one. -->
    <div id="nw-cluster" class="np-cluster nw-cluster hidden" data-turbo-permanent>
      <a id="nw-link" class="np-title-link nw-link" href="/tv" title="Resume watching">
        <span class="nw-icon">{{template "icon-tv"}}</span><span id="nw-title" class="np-title"></span>
      </a>
      <button id="nw-dismiss" type="button" class="np-toggle nw-dismiss" aria-label="Dismiss resume" title="Dismiss">×</button>
    </div>

    <!-- Now-playing cluster + the single persistent audio element. Both are
         data-turbo-permanent, so Turbo carries them across page visits and music
         keeps playing. player.js owns them. Hidden until something is playing. -->
    <div id="np-cluster" class="np-cluster hidden" data-turbo-permanent>
      <button id="np-toggle" type="button" class="np-toggle" aria-label="Play or pause" title="Play / pause">
        <span class="np-glyph-play">{{template "icon-play"}}</span>
        <span class="np-glyph-pause">{{template "icon-pause"}}</span>
      </button>
      <a id="np-title-link" class="np-title-link" href="/music/player" title="Open the player"><span id="np-title" class="np-title"></span></a>
      <button id="np-close" type="button" class="np-toggle np-close" aria-label="Stop playback" title="Stop">{{template "icon-x"}}</button>
    </div>
    <audio id="hespera-audio" data-turbo-permanent preload="none" playsinline class="hidden"></audio>
    <!-- Hidden YouTube IFrame host for in-app playback of un-owned year-journey
         songs. The permanent wrapper is what Turbo carries across navigations
         (the API replaces the inner #yt-player div with an iframe, so the iframe
         itself isn't data-turbo-permanent — the wrapper keeps it alive). -->
    <div id="yt-host" data-turbo-permanent class="hidden"><div id="yt-player"></div></div>
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle light and dark theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </header>

  <main class="main">
    {{template "content" .}}
  </main>

  <footer class="footer">
    <div>Hespera</div>
  </footer>

  <script>
    (() => {
      // This inline script re-runs on every Turbo render, so bind the
      // document-level listeners exactly ONCE (guarded) — otherwise each
      // navigation would add a fresh pair that never gets torn down. They query
      // [data-menu] live on each event, so they keep working across swaps.
      if (window.__menuGlobalsBound) return;
      window.__menuGlobalsBound = true;

      const closeMenu = (menu) => {
        menu.removeAttribute('data-open');
        const trigger = menu.querySelector('[data-menu-trigger]');
        if (trigger) trigger.setAttribute('aria-expanded', 'false');
      };

      const openMenu = (menu) => {
        document.querySelectorAll('[data-menu]').forEach((m) => { if (m !== menu) closeMenu(m); });
        menu.setAttribute('data-open', '1');
        const trigger = menu.querySelector('[data-menu-trigger]');
        if (trigger) trigger.setAttribute('aria-expanded', 'true');
      };

      // One delegated click handler: toggle a trigger's own menu, else close any
      // menu the click landed outside of. Delegating means triggers (which are
      // fresh DOM after every Turbo swap) need no per-element binding.
      document.addEventListener('click', (e) => {
        const target = e.target;
        if (!(target instanceof Node)) return;
        const trigger = target.closest ? target.closest('[data-menu-trigger]') : null;
        if (trigger) {
          const menu = trigger.closest('[data-menu]');
          if (menu) {
            if (menu.getAttribute('data-open') === '1') {
              closeMenu(menu);
            } else {
              e.preventDefault();
              openMenu(menu);
            }
            return;
          }
        }
        document.querySelectorAll('[data-menu]').forEach((menu) => {
          if (!menu.contains(target)) closeMenu(menu);
        });
      });

      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        document.querySelectorAll('[data-menu]').forEach(closeMenu);
      });
    })();

    (() => {
      const btn = document.querySelector('[data-theme-toggle]');
      if (!btn) return;
      const root = document.documentElement;
      const sync = () => {
        const light = root.getAttribute('data-mode') === 'light';
        btn.setAttribute('aria-label', light ? 'Switch to dark theme' : 'Switch to light theme');
        btn.setAttribute('aria-pressed', String(light));
      };
      sync();
      btn.addEventListener('click', () => {
        const next = root.getAttribute('data-mode') === 'light' ? 'dark' : 'light';
        root.setAttribute('data-mode', next);
        try { localStorage.setItem('iso_theme_mode', next); } catch (_) {}
        sync();
      });
    })();
  </script>
</body>
</html>
