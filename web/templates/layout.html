<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hespera</title>
  {{/* Per-page <head> hook. A media-boot page (one whose inline body script
       auto-starts <video>/<audio> on render) overrides "headmeta" with
       <meta name="turbo-cache-control" content="no-preview"> so Turbo never
       renders it as a cached preview — a preview re-runs the body script on a
       throwaway DOM, orphaning a still-playing media element. */}}
  {{block "headmeta" .}}{{end}}
  <link rel="icon" type="image/svg+xml" href="{{staticv "/static/hespera-icon-favicon.svg"}}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{staticv "/static/png/hespera-icon-32.png"}}" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{staticv "/static/png/hespera-icon-16.png"}}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{staticv "/static/png/hespera-icon-180.png"}}" />
  <link rel="manifest" href="{{staticv "/static/site.webmanifest"}}" />
  <meta name="theme-color" content="#312e81" />
  <script>
    (() => {
      try {
        // Display scale: one UI, sized to the physical display the window sits
        // on (html[data-scale] → root font-size; the whole UI is rem-based).
        // The cached class applies instantly here (no scale flash); the
        // auto-detect fetch below refreshes it. ?scale=desktop|large|tv pins a
        // manual override, ?scale=auto returns to detection. ?couch=1/0 is the
        // legacy alias for ?scale=tv / ?scale=auto.
        const params = new URLSearchParams(location.search);
        let p = params.get('scale');
        const couch = params.get('couch'); // legacy alias
        if (!p && couch === '1') p = 'tv';
        if (!p && couch === '0') p = 'auto';
        if (p === 'desktop' || p === 'large' || p === 'tv') {
          localStorage.setItem('iso_scale', p);
          localStorage.setItem('iso_scale_manual', '1');
        } else if (p === 'auto') {
          localStorage.removeItem('iso_scale_manual');
        }
        const scale = localStorage.getItem('iso_scale');
        if (scale) document.documentElement.setAttribute('data-scale', scale);
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="{{staticv "/static/app.css"}}" />
  <script src="{{staticv "/static/turbo.umd.js"}}" defer></script>
  <script src="{{staticv "/static/couch.js"}}" defer></script>
  <script src="{{staticv "/static/subtabs.js"}}" defer></script>
  <script src="{{staticv "/static/hls.light.min.js"}}" defer></script>
  <script src="{{staticv "/static/media_player.js"}}" defer></script>
  <script src="{{staticv "/static/player.js"}}" defer></script>
  <script src="{{staticv "/static/tv_resume.js"}}" defer></script>
  <script src="{{staticv "/static/job_status.js"}}" defer></script>
  <script src="{{staticv "/static/era_slider.js"}}" defer></script>
  <script src="{{staticv "/static/grid_pager.js"}}" defer></script>
  <script src="{{staticv "/static/carousel.js"}}" defer></script>
  <script src="{{staticv "/static/search.js"}}" defer></script>
  <script src="{{staticv "/static/playlist_picker.js"}}" defer></script>
  <script src="{{staticv "/static/update_pill.js"}}" defer></script>
  <script src="{{staticv "/static/clock.js"}}" defer></script>
  <script src="{{staticv "/static/about_health.js"}}" defer></script>
  <script src="{{staticv "/static/photo_view.js"}}" defer></script>
  <script src="{{staticv "/static/book_reader.js"}}" defer></script>
</head>
<body>
  {{/* There is no topbar. The home screen is the hub (its cards are the nav,
       its header carries the utilities) and every other page carries a
       breadcrumb rooted at Home, so the UI has no persistent chrome — a
       10-foot-first shape. The two things that genuinely must outlive a page
       (the audio element and the now-playing / resume chips) live here in the
       shell as data-turbo-permanent floating chrome instead. */}}

  <!-- The single persistent audio element. data-turbo-permanent, so Turbo
       carries it across page visits and music keeps playing. player.js owns it
       and hard-aborts without it. -->
  <audio id="hespera-audio" data-turbo-permanent preload="none" playsinline class="hidden"></audio>

  <div class="chip-stack">
    <!-- Resume-watching chip for TV/video. data-turbo-permanent so it persists
         across visits; tv_resume.js shows it when you've navigated away from a
         player and hides it while you're on one. -->
    <div id="nw-cluster" class="np-cluster nw-cluster hidden" data-turbo-permanent>
      <a id="nw-link" class="np-title-link nw-link" href="/tv" title="Resume watching">
        <span class="nw-icon">{{template "icon-tv"}}</span><span id="nw-title" class="np-title"></span>
      </a>
      <button id="nw-dismiss" type="button" class="np-toggle nw-dismiss" aria-label="Dismiss resume" title="Dismiss">×</button>
    </div>

    <!-- Now-playing chip: the only route back to the player once you wander off,
         and the only stop-playback control. data-turbo-permanent; player.js owns
         it. Hidden until something is playing. -->
    <div id="np-cluster" class="np-cluster hidden" data-turbo-permanent>
      <button id="np-toggle" type="button" class="np-toggle" aria-label="Play or pause" title="Play / pause">
        <span class="np-glyph-play">{{template "icon-play"}}</span>
        <span class="np-glyph-pause">{{template "icon-pause"}}</span>
      </button>
      <a id="np-title-link" class="np-title-link" href="/music/player" title="Open the player"><span id="np-title" class="np-title"></span></a>
      <button id="np-close" type="button" class="np-toggle np-close" aria-label="Stop playback" title="Stop">{{template "icon-x"}}</button>
    </div>
  </div>

  <main class="main">
    {{template "breadcrumb" .}}
    {{template "content" .}}
  </main>

  <footer class="footer">
    <div>Hespera</div>
  </footer>

  {{/* Add-to-playlist picker (playlist_picker.js) — opened by any
       [data-playlist-add] (album track rows, the transport's Add) or
       [data-playlist-save] (save the current queue). Same couch-overlay
       pattern as the search palette; re-rendered closed per Turbo swap. */}}
  <div id="plpick-modal" class="playlist-modal hidden" data-couch-overlay>
    <div class="playlist-panel">
      <div class="plpick-head">
        <strong id="plpick-title">Add to playlist</strong>
        <button id="plpick-close" type="button" class="btn btn-sm" data-couch-dismiss aria-label="Close">Close</button>
      </div>
      <ol id="plpick-list" class="tracks"></ol>
      <form id="plpick-new" class="plpick-new">
        <input id="plpick-name" type="text" class="input" placeholder="New playlist…" maxlength="120" autocomplete="off" />
        <button type="submit" class="btn btn-sm btn-primary">Create</button>
      </form>
      <p id="plpick-status" class="form-help"></p>
    </div>
  </div>

  {{/* Global search palette — the "/" jump-to (search.js). A couch overlay:
       Back dismisses via the Close button; while visible, couch.js scopes
       focus candidates to it. Re-rendered per Turbo swap (state = closed). */}}
  <div id="search-modal" class="playlist-modal search-modal hidden" data-couch-overlay>
    <div class="playlist-panel search-panel">
      <div class="search-head">
        <input id="search-input" type="search" placeholder="Search artists, albums, songs, shows, movies, people…" autocomplete="off" spellcheck="false" />
        <button id="search-close" type="button" class="btn btn-sm" data-couch-dismiss aria-label="Close search">Close</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <script>
    // Reload button (home's utility cluster). Not window-guarded and not
    // delegated: this inline script re-runs on every Turbo render, and the
    // button is re-rendered with the page, so it re-binds to the fresh node.
    (() => {
      const reload = document.querySelector('[data-app-reload]');
      if (reload) reload.addEventListener('click', () => window.location.reload());
    })();

    // App-wide full screen — home's utility cluster AND the media players'
    // #tvFullscreenBtn both carry data-app-fullscreen and toggle the same
    // app-root fullscreen; on player pages CSS expands the video wrap to fill
    // the viewport, so fullscreen survives Turbo swaps (Up Next auto-advance)
    // and fixed modals stay visible. Window-guarded so the document-level
    // listeners bind ONCE (the inline script re-runs on every Turbo render);
    // delegated so re-rendered buttons stay wired. Gated on
    // fullscreenElement === documentElement.
    (() => {
      if (window.__hesperaFullscreen) return;
      window.__hesperaFullscreen = true;
      const root = document.documentElement;
      const appFs = () => document.fullscreenElement === root;

      document.addEventListener('click', (e) => {
        if (!(e.target.closest && e.target.closest('[data-app-fullscreen]'))) return;
        if (document.fullscreenElement) { if (document.exitFullscreen) document.exitFullscreen().catch(() => {}); }
        else if (root.requestFullscreen) root.requestFullscreen().catch(() => {});
      });
      document.addEventListener('fullscreenchange', () => {
        root.classList.toggle('is-fullscreen', appFs());
        const on = !!document.fullscreenElement;
        document.querySelectorAll('[data-app-fullscreen]').forEach((btn) => {
          btn.setAttribute('aria-label', on ? 'Exit full screen' : 'Full screen');
          btn.setAttribute('title', on ? 'Exit full screen' : 'Full screen');
        });
      });
    })();

    // Display-scale auto-detect: ask the server (same machine in app mode)
    // which display this window sits on, by its physical size. Window-guarded;
    // re-checks on turbo:load only when the window has moved to a different
    // origin (dragged to another display). A manual ?scale= override pins the
    // class and skips detection; server mode answers unknown and nothing
    // changes. The boot script in <head> already applied the cached class, so
    // this only ever *updates* — no flash on repeat loads.
    (() => {
      if (window.__hesperaScale) return;
      window.__hesperaScale = true;
      let lastOrigin = null;
      const detect = async () => {
        try {
          if (localStorage.getItem('iso_scale_manual') === '1') return;
          const key = window.screenX + ',' + window.screenY;
          if (key === lastOrigin) return;
          lastOrigin = key;
          const res = await fetch('/display/scale?x=' + window.screenX + '&y=' + window.screenY);
          if (!res.ok) return;
          const { class: cls } = await res.json();
          if (!cls) return; // unknown: keep whatever is cached
          localStorage.setItem('iso_scale', cls);
          document.documentElement.setAttribute('data-scale', cls);
        } catch (_) {}
      };
      document.addEventListener('turbo:load', detect);
      detect();
    })();
  </script>
</body>
</html>
