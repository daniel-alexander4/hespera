{{/* Shared custom seek bar for the TV/movie players. Native <video controls>
     can't seek the progressive (remux/burn-in) streams — their scrubber is dead
     (video.seekable == [0,0]) — so the players drop native controls and use this
     click/drag-to-seek bar, wired in media_player.js. On seekable paths it does a
     native currentTime seek; on progressive paths a single ?start= reload. */}}
{{define "media-seekbar"}}
<div class="media-seek">
  <div class="media-scrubber" id="mediaScrubber" tabindex="0" role="slider" data-couch-capture
       aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div class="media-scrubber-fill" id="mediaScrubberFill"></div>
    <div class="media-scrubber-thumb" id="mediaScrubberThumb"></div>
    {{/* FF/RW scan indicator (media_player.js): rendered here for its inline
         SVG icons, then reparented into the trickplay preview cluster so
         direction + speed (▶▶ 8×) ride the playhead during a virtual scan. */}}
    <div class="media-scan-pill" id="mediaScanPill" hidden>
      <span class="media-scan-rw">{{template "icon-rewind"}}</span><span class="media-scan-ff">{{template "icon-fast-forward"}}</span><span class="media-scan-speed"></span>
    </div>
  </div>
  <div class="media-time"><span id="mediaCur">0:00</span> / <span id="mediaDur">0:00</span></div>
</div>
{{end}}

{{/* Shared transport — ONLY the primary playback controls (prev/rewind/play/ff/
     next), centered as one cluster. The audio utilities (mute/volume/boost/reload/
     fullscreen) live on the media-controls row below, so row 1 stays a clean,
     prominent, centered transport. media_player.js drives everything by id. */}}
{{define "media-transport"}}
<div class="player-controls tv-transport" id="tvTransport">
  {{/* |< is ALWAYS live: past 10s (or with no previous file at all — a movie, a
       season's first episode, an extra) it restarts the current file; inside 10s it
       steps back. So it is never hidden. NEXT still is: media_player.js unhides it
       only when the video carries a non-zero data-next-file (there is no forward
       analogue of "restart"). */}}
  <button id="tvPrevEpBtn" type="button" class="btn btn-sm" aria-label="Previous or restart" title="Previous or restart">{{template "icon-skip-back"}}</button>
  <button id="tvRewindBtn" type="button" class="btn btn-sm" aria-label="Rewind" title="Rewind — press again for 8× / 32×">{{template "icon-rewind"}}</button>
  <button id="tvToggleBtn" type="button" class="btn btn-primary btn-sm" aria-label="Play or pause" title="Play / Pause"><span class="tv-glyph-play">{{template "icon-play"}}</span><span class="tv-glyph-pause">{{template "icon-pause"}}</span></button>
  <button id="tvForwardBtn" type="button" class="btn btn-sm" aria-label="Fast-forward" title="Fast-forward — press again for 8× / 32×">{{template "icon-fast-forward"}}</button>
  <button id="tvNextEpBtn" type="button" class="btn btn-sm" aria-label="Next episode" title="Next episode" hidden>{{template "icon-skip-forward"}}</button>
  {{/* Wall clock — "is it too late for another episode?". Same #app-clock the
       home masthead uses, so the shell's clock.js drives it with no new JS (it
       queries the id per tick and no page carries two). Absolutely positioned at
       the right edge, under the seek row's elapsed/duration readout, so the
       transport above stays a genuinely centered cluster. */}}
  <span id="app-clock" class="media-clock" aria-label="Current time"></span>
</div>
{{end}}

{{/* Shared secondary-controls row — the SINGLE source for TV/movie/photo so the
     three players can't drift (they hand-copied this row before and had already
     diverged). Three zones: LEFT = audio/subtitle pickers + Auto-skip/Mute-ads;
     CENTER = the audio utilities (mute/volume/dialogue boost/reload/fullscreen);
     RIGHT = the speed slider + the transcode-mode label. media_player.js wires
     every control by id; the OpenSubtitles "Search subtitles…" option is added to
     #subSelect only when the video carries data-os-enabled (TV). */}}
{{define "media-controls"}}
<div class="tv-player-controls">
  <div class="tv-controls-left">
    <label class="tv-track-pick tv-speed" id="speedPick">Speed
      <input id="speedSlider" type="range" min="0.5" max="2" step="0.25" value="1" class="tv-speed-range" aria-label="Playback speed" />
      <span class="tv-speed-val" id="speedVal">1×</span>
    </label>
    <label class="tv-track-pick" id="subPick" hidden>Subtitles
      <select id="subSelect"></select>
    </label>
    <label class="tv-track-pick" id="audioPick" hidden>Audio
      <select id="audioSelect"></select>
    </label>
    <button type="button" id="skipAutoBtn" class="btn" hidden aria-pressed="false" title="Automatically skip intros, recaps &amp; ads">{{template "icon-skip-forward"}}Auto-skip</button>
    <button type="button" id="muteAdsBtn" class="btn" hidden aria-pressed="false" title="Automatically mute commercials">{{template "icon-volume-x"}}Mute ads</button>
  </div>
  {{/* Playback-mode / error surface. media_player.js leaves it empty during normal
       playback (so no "Transcode" clutter) and writes it only on error — where it
       shows centered between the two control groups. */}}
  <span id="playbackMode" class="tv-playback-mode"></span>
  <div class="tv-controls-right">
    <button id="tvMuteBtn" type="button" class="btn btn-sm" aria-pressed="false" aria-label="Mute" title="Mute"><span class="tv-glyph-vol">{{template "icon-volume"}}</span><span class="tv-glyph-mute" hidden>{{template "icon-volume-x"}}</span></button>
    <input id="tvVolume" type="range" min="0" max="1" step="0.05" value="1" class="tv-volume" aria-label="Volume" />
    <button id="tvBoostBtn" type="button" class="btn btn-sm is-on" aria-pressed="true" aria-label="Dialogue boost — even out loud music vs quiet dialogue" title="Dialogue boost: On">{{template "icon-audio-lines"}}</button>
    <button id="tvReloadBtn" type="button" class="btn btn-sm" aria-label="Reload video" title="Reload video">{{template "icon-rotate-cw"}}</button>
    {{/* data-app-fullscreen: handled by the layout shell's delegated handler — the
         same app-root fullscreen as the home screen's button (one fullscreen state
         app-wide; CSS expands the video wrap to fill the viewport on player pages).
         The fs-enter/fs-exit pair swaps via the shared [data-app-fullscreen] CSS. */}}
    <button id="tvFullscreenBtn" type="button" class="btn btn-sm" data-app-fullscreen aria-label="Full screen" title="Full screen"><span class="fs-enter">{{template "icon-maximize"}}</span><span class="fs-exit">{{template "icon-minimize"}}</span></button>
  </div>
</div>
{{end}}
