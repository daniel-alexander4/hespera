{{define "content"}}
<div class="player-page" data-autoload="{{.AutoloadQuery}}">
  <p><a href="/music">&#8592; Back to Music</a></p>

  <div id="player-empty" class="empty-state hidden">
    <p>Nothing is playing right now.</p>
    <p><a href="/music" class="btn">Browse Music</a></p>
  </div>

  <div id="player-main" class="player-main-grid hidden">
    <div class="player-cover">
      <img id="player-cover-img" alt="current album cover" class="hidden" />
      <div id="player-cover-ph" class="album-art-ph big" aria-hidden="true">{{template "icon-disc"}}</div>
    </div>

    <div class="player-main">
      <div class="text-muted"><strong>Album:</strong> <span id="player-album-title">&#8212;</span></div>
      <div class="text-muted"><strong>Track:</strong> <span id="player-track-title">&#8212;</span></div>

      <div class="player-seek-row">
        <input id="player-seek" type="range" min="0" max="1000" value="0" step="1" aria-label="Seek" />
        <span id="player-time" class="text-muted">0:00 / &#8211;:&#8211;&#8211;</span>
      </div>

      <div class="player-controls">
        <button id="player-prev-btn" type="button" class="btn btn-sm" aria-label="Previous or restart" title="Previous or restart">{{template "icon-skip-back"}}</button>
        <button id="player-rewind-btn" type="button" class="btn btn-sm" aria-label="Rewind 10s" title="Rewind 10s">{{template "icon-rewind"}}</button>
        <button id="player-toggle-btn" type="button" class="btn btn-primary btn-sm" aria-label="Play/Pause" title="Play/Pause">{{template "icon-pause"}}</button>
        <button id="player-forward-btn" type="button" class="btn btn-sm" aria-label="Forward 10s" title="Forward 10s">{{template "icon-fast-forward"}}</button>
        <button id="player-next-btn" type="button" class="btn btn-sm" aria-label="Next track" title="Next track">{{template "icon-skip-forward"}}</button>
      </div>

      <div id="player-karaoke" class="player-shell-karaoke text-muted">
        <div id="player-karaoke-current" class="player-shell-karaoke-current">Lyrics unavailable</div>
        <div id="player-karaoke-next" class="player-shell-karaoke-next"></div>
      </div>

      <button id="playlist-open-btn" type="button" class="btn btn-sm" aria-label="Show playlist" title="Show playlist">Playlist</button>
    </div>
  </div>
</div>

<div id="playlist-modal" class="playlist-modal hidden" data-couch-overlay>
  <div class="playlist-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
      <strong>Playlist</strong>
      <button id="playlist-close-btn" type="button" class="btn btn-sm" data-couch-dismiss>Close</button>
    </div>
    <ol id="playlist-list" class="tracks"></ol>
  </div>
</div>
{{end}}
