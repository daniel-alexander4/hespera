# nfpm config for the Hespera .deb. The build scripts set ARCH/VERSION in the
# environment and stage the binaries to dist/hespera and dist/hescli (nfpm
# expands ${ARCH}/${VERSION} but not contents.src globs, so those paths are
# literal). No systemd unit: Hespera is launched on demand as a desktop app
# (the .desktop entry below opens a chromeless window) — there is no service.
name: hespera
arch: ${ARCH}
version: ${VERSION}
section: net
priority: optional
maintainer: Dan <daniel@alexander4.org>
description: |
  Hespera — a local app for your Music, TV, and Movies with automatic metadata
  matching. Launches a chromeless app window on your machine (loopback-only); a
  Docker server mode is also available.
# ffmpeg powers TV/movie transcoding + tag recovery. apt pulls it on install.
depends:
  - ffmpeg
contents:
  - src: dist/hespera
    dst: /usr/bin/hespera
    file_info:
      mode: 0755
  - src: dist/hescli
    dst: /usr/bin/hescli
    file_info:
      mode: 0755
  # Lazy-loaded bash completion for hescli (sources the current script from the
  # binary on first Tab, so it never drifts from the CLI).
  - src: build/hescli.bash
    dst: /usr/share/bash-completion/completions/hescli
    file_info:
      mode: 0644
  # Desktop launcher + icon so Hespera appears in the app menu and opens a
  # chromeless window. StartupWMClass=Hespera matches the --class the launcher
  # passes Chromium, so the panel shows this icon (see internal/browser).
  - src: build/hespera.desktop
    dst: /usr/share/applications/hespera.desktop
    file_info:
      mode: 0644
  - src: build/hespera.svg
    dst: /usr/share/icons/hicolor/scalable/apps/hespera.svg
    file_info:
      mode: 0644
  # License + third-party attribution (THIRD_PARTY_LICENSES.md is kept current by
  # TestThirdPartyLicensesCurrent).
  - src: LICENSE
    dst: /usr/share/doc/hespera/copyright
    file_info:
      mode: 0644
  - src: THIRD_PARTY_LICENSES.md
    dst: /usr/share/doc/hespera/THIRD_PARTY_LICENSES.md
  - src: third_party/licenses
    dst: /usr/share/doc/hespera/licenses
    file_info:
      mode: 0644
